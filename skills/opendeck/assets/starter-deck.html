<!-- ───────────────────────────────────────────────────────────────────────
  OpenDeck — starter-deck.html — a minimal, WORKING narrated deck (plain HTML).
  Built with the OpenDeck skill kit (v1.0.0) · by The OpenDeck Authors · MIT.

  Open it directly in a browser — it runs with no build step or runtime.
  Copy it into your project, then replace the <section> slides with your own.
  (This credit lives only in the file header/metadata — keep your slide
   content generic so nothing leaks into the decks you build from it.)

  WHAT'S WIRED HERE (see SKILL.md for the full guide):
   • deck-stage.js      — the slide engine (scaling, nav, rail, notes, print)
   • deck-enhance.js     — data-step reveals, step dots, data-tip tooltips, F/S keys
   • narration-script.js — your narration text (edit this file)
   • narration-audio.js  — OPTIONAL, generated by the Audio Studio; baked clips
   • deck-narration.js   — Narrate + Auto-play controls, the Audio Studio
   • deck-export.js      — the in-browser bundler (Build preview / Publish)

  LOAD ORDER MATTERS (bottom of <body>): deck-stage → enhance → script →
  (audio) → narration → export. All files sit in the SAME folder as this deck.

  BUILDING INSIDE A CLAUDE DESIGN PROJECT? See SKILL.md — there you author the
  deck as a Design Component (.dc.html) and the same five files load from
  <helmet>. This plain-HTML form is the portable/standalone shape.
──────────────────────────────────────────────────────────────────────────── -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="generator" content="OpenDeck 1.0.0">
<meta name="author" content="The OpenDeck Authors">
<title>OpenDeck — Starter</title>
<style>
  html, body { margin: 0; padding: 0; background: #111; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  deck-stage:not(:defined) { visibility: hidden; }
  deck-stage { background: #111; }

  /* Each slide is a full-bleed canvas at the deck's design size. */
  section {
    background: #fff; color: #16181b; position: relative; overflow: hidden;
    box-sizing: border-box; padding: 96px 120px;
    display: flex; flex-direction: column; justify-content: center;
  }
  section.dark { background: #111418; color: #fff; }
  .eyebrow { font-size: 24px; letter-spacing: .14em; text-transform: uppercase; color: #007bc0; font-weight: 700; margin: 0 0 24px; }
  h1 { font-size: 92px; line-height: 1.04; font-weight: 800; margin: 0 0 28px; letter-spacing: -.02em; }
  h2 { font-size: 64px; line-height: 1.08; font-weight: 800; margin: 0 0 48px; letter-spacing: -.015em; }
  p.lead { font-size: 34px; line-height: 1.4; color: #565b61; max-width: 1200px; margin: 0; }
  .row { display: flex; gap: 28px; margin-top: 16px; }
  .tile { flex: 1; background: #f4f6f8; border-radius: 16px; padding: 40px; }
  .tile h3 { font-size: 36px; margin: 0 0 12px; font-weight: 700; }
  .tile p { font-size: 26px; line-height: 1.4; color: #565b61; margin: 0; }
  .tile.accent { background: #e9f3fb; box-shadow: inset 0 0 0 2px #007bc0; }

  /* ── REQUIRED animation styles (also in deck-animation.css) ──────────── */
  deck-stage [data-step] {
    opacity: 0; transform: translateY(10px);
    transition: opacity 480ms cubic-bezier(.2,0,0,1), transform 480ms cubic-bezier(.2,0,0,1);
    pointer-events: none;
  }
  [data-step].step-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  [data-step].step-past    { opacity: 0.92; }
  [data-step].step-current { opacity: 1; }

  deck-stage .step-dots { position: absolute; bottom: 36px; left: 120px; display: none; gap: 8px; align-items: center; z-index: 4; }
  deck-stage .step-dots.has-steps { display: flex; }
  .step-dots .dot { width: 12px; height: 2px; background: rgba(0,0,0,.22); transition: background 200ms ease, width 200ms ease; }
  .step-dots .dot.on { background: rgba(0,0,0,.5); }
  .step-dots .dot.current { background: #007bc0; width: 24px; }
  .dark .step-dots .dot { background: rgba(255,255,255,.3); }
  .dark .step-dots .dot.on { background: rgba(255,255,255,.6); }

  [data-tip] { cursor: help; }
  #deck-tip {
    position: fixed; left: 0; top: 0; background: #1a1a1a; color: #fff;
    padding: 16px 20px; font-size: 22px; line-height: 1.45; max-width: 520px;
    pointer-events: none; opacity: 0; z-index: 9999;
    box-shadow: 0 12px 40px rgba(0,0,0,.28); transition: opacity 180ms ease; --tip-arrow-x: 50%;
  }
  #deck-tip.show { opacity: 1; }
  #deck-tip::after { content: ''; position: absolute; left: var(--tip-arrow-x); width: 12px; height: 12px; background: #1a1a1a; transform: translateX(-50%) rotate(45deg); bottom: -6px; top: auto; }
  #deck-tip.below::after { bottom: auto; top: -6px; }
</style>
</head>
<body>

<deck-stage width="1920" height="1080">

  <!-- Slide 1 — title. data-label shows in the rail; data-speaker-notes is the note. -->
  <section data-label="Title" class="dark" data-speaker-notes="Open with the one-sentence pitch.">
    <p class="eyebrow">Quarterly Review</p>
    <h1>Your title goes here</h1>
    <p class="lead">A one-line subtitle that sets up the story.</p>
  </section>

  <!-- Slide 2 — stepped reveal. Each data-step element appears on the next →.
       Step dots auto-appear bottom-left. The accent tile has a hover tooltip. -->
  <section data-label="Three Pillars" data-speaker-notes="Reveal each pillar as you talk to it.">
    <h2>Built on three pillars</h2>
    <div class="row">
      <div class="tile" data-step="1" data-tip="Reveal this first — the foundation everything rests on.">
        <h3>Pillar one</h3>
        <p>Short supporting line.</p>
      </div>
      <div class="tile" data-step="2" data-tip="The second piece builds on the first.">
        <h3>Pillar two</h3>
        <p>Short supporting line.</p>
      </div>
      <div class="tile accent" data-step="3" data-tip="The payoff — what ties it together.">
        <h3>Pillar three</h3>
        <p>Short supporting line.</p>
      </div>
    </div>
  </section>

  <!-- Slide 3 — closing. -->
  <section data-label="Close" class="dark" data-speaker-notes="Restate the ask and stop.">
    <h1>Thank you</h1>
    <p class="lead">Questions?</p>
  </section>

</deck-stage>

<!-- Load order: stage first, then enhance → narration text → (baked audio) →
     narration engine. narration-audio.js is OPTIONAL — uncomment once you have
     baked audio (the Audio Studio's "Download audio" produces it). -->
<script src="deck-stage.js"></script>
<script src="deck-enhance.js"></script>
<script src="narration-script.js"></script>
<!-- <script src="narration-audio.js"></script> -->
<script src="deck-narration.js"></script>
<script src="deck-export.js"></script>

<!-- Engine-load watchdog (inline on purpose — it must run even if the scripts
     above failed to load). If <deck-stage> never upgrades — typically because
     this deck was opened as a lone file without its companion scripts, e.g. in
     a single-file preview like the Claude web app — the page would otherwise
     show blank. Surface an actionable message instead, and auto-clear it if the
     engine loads (even late). A published/preview bundle inlines everything, so
     this never fires there. Safe to keep in every deck. -->
<script>
(function () {
  if (window.__deckWatchdog) return; window.__deckWatchdog = 1;
  function defined() { return !!(window.customElements && customElements.get && customElements.get("deck-stage")); }
  var box = null;
  function clear() { if (box && box.parentNode) box.parentNode.removeChild(box); box = null; }
  if (window.customElements && customElements.whenDefined) {
    try { customElements.whenDefined("deck-stage").then(clear); } catch (e) {}
  }
  setTimeout(function () {
    if (defined() || box) return;
    box = document.createElement("div");
    box.setAttribute("style", "position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:8vw;background:#0b0b0f;color:#e9e9ee;font:500 16px/1.55 system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;text-align:center;");
    var inner = document.createElement("div");
    inner.style.maxWidth = "34em";
    var h = document.createElement("div");
    h.style.cssText = "font-size:22px;font-weight:700;margin-bottom:.55em;";
    h.textContent = "Deck engine didn’t load";
    var p = document.createElement("div");
    p.style.opacity = ".82";
    p.textContent = "You’re viewing this deck as a lone file without its companion scripts. Ask your agent to publish this deck — you’ll get one self-contained .html that runs anywhere.";
    inner.appendChild(h); inner.appendChild(p); box.appendChild(inner);
    (document.body || document.documentElement).appendChild(box);
  }, 2200);
})();
</script>

</body>
</html>
